<!-- 🔗 網址轉 MP3 提取器區塊 -->
<div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;">
    <h3 style="margin-top: 0; color: #1e293b; display: flex; align-items: center; gap: 8px;">
        🔗 網址提取 MP3 
    </h3>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 15px;">
        支援 Now新聞、YouTube 等網址。伺服器將在雲端自動擷取並轉檔，為您避開公司網路限制。
    </p>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="extract-url" placeholder="例如：https://news.now.com/home/local/player?newsId=..." 
               style="flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none;">
        <button id="extract-btn" 
                style="padding: 12px 24px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
            📥 提取並下載
        </button>
    </div>
    
    <!-- 狀態提示文字 -->
    <div id="extract-status" style="margin-top: 12px; font-size: 14px; font-weight: 500;"></div>
</div>

<!-- ⚙️ 處理下載邏輯的 JavaScript -->
<script>
document.getElementById('extract-btn').addEventListener('click', async () => {
    const urlInput = document.getElementById('extract-url').value.trim();
    const statusDiv = document.getElementById('extract-status');
    const btn = document.getElementById('extract-btn');

    // 防呆：檢查是否為空
    if (!urlInput) {
        statusDiv.innerHTML = '<span style="color: #ef4444;">❌ 請先輸入網址！</span>';
        return;
    }

    // 1. 鎖定按鈕，顯示處理中（這很重要，因為雲端下載需要時間）
    btn.disabled = true;
    btn.style.background = '#94a3b8';
    btn.innerText = '⏳ 處理中...';
    statusDiv.innerHTML = '<span style="color: #f59e0b;">⏳ 伺服器正在雲端下載並轉碼成 MP3，這可能需要 1-2 分鐘，請勿關閉網頁...</span>';

    try {
        // 2. 打包資料發送給我們剛寫好的 FastAPI 後端
        const formData = new FormData();
        formData.append('url', urlInput);

        const response = await fetch('/api/extract-audio', {
            method: 'POST',
            body: formData
        });

        // 檢查後端是否報錯
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || '伺服器發生未知錯誤');
        }

        // 3. 接收轉好的 MP3 檔案並觸發瀏覽器下載
        const blob = await response.blob();
        
        // 嘗試從 Header 抓取原本的檔名，如果沒有就用預設的
        let filename = 'extracted_audio.mp3';
        const disposition = response.headers.get('Content-Disposition');
        if (disposition && disposition.indexOf('filename=') !== -1) {
            const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
            const matches = filenameRegex.exec(disposition);
            if (matches != null && matches[1]) { 
                filename = matches[1].replace(/['"]/g, '');
            }
        }

        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        // 清理記憶體
        window.URL.revokeObjectURL(downloadUrl);
        document.body.removeChild(a);

        // 4. 成功提示
        statusDiv.innerHTML = '<span style="color: #10b981;">✅ 提取成功！檔案已開始下載。</span>';
        document.getElementById('extract-url').value = ''; // 清空輸入框

    } catch (error) {
        statusDiv.innerHTML = `<span style="color: #ef4444;">❌ 發生錯誤：${error.message}</span>`;
    } finally {
        // 5. 恢復按鈕狀態
        btn.disabled = false;
        btn.style.background = '#0284c7';
        btn.innerText = '📥 提取並下載';
    }
});
</script>
